# Render Blueprint for MAGDA AI x TINGO (SOA Architecture)
# Official 1-click deployment on Render.com

services:
  # 🔐 ServicioAuth (Autenticación Microservicio)
  - type: web
    name: magda-servicio-auth
    env: node
    region: oregon
    plan: free
    buildCommand: cd ServicioAuth && npm install
    startCommand: cd ServicioAuth && node src/index.js
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: magda-db
          property: connectionString

  # 🤖 ServicioMagda (Portal Web + API Gateway)
  - type: web
    name: magda-web-portal
    env: node
    region: oregon
    plan: free
    buildCommand: cd ServicioMagda && npm install
    startCommand: cd ServicioMagda && node src/index.js
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        fromService:
          type: web
          name: magda-servicio-auth
          envVarKey: JWT_SECRET
      - key: AUTH_SERVICE_URL
        value: https://magda-servicio-auth.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: magda-db
          property: connectionString

databases:
  # 🗄️ PostgreSQL Database
  - name: magda-db
    region: oregon
    plan: free
    databaseName: magda_db
    user: magda_user
